<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Flow</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --text: #eef0f4;
    --muted: #8a90a2;
    --accent: #7c9bff;
    --accent-2: #ff9d7c;
    --good: #6fe3a0;
    --danger: #ff6b6b;
    --ring-bg: #262b36;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background: radial-gradient(circle at 30% 10%, #1a1e28, var(--bg) 60%);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  body {
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }
  .app {
    width: 100%;
    max-width: 900px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 24px;
  }
  @media (max-width: 720px) {
    .app { grid-template-columns: 1fr; }
  }
  .card {
    background: var(--panel);
    border: 1px solid #262b36;
    border-radius: 16px;
    padding: 24px;
  }
  h1 {
    font-size: 20px;
    font-weight: 600;
    margin: 0 0 4px;
    letter-spacing: 0.2px;
  }
  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 20px;
  }
  .header {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: -4px;
  }
  .streak {
    text-align: right;
    font-size: 13px;
    color: var(--muted);
  }
  .streak .num {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent-2);
    display: block;
  }

  /* Timer card */
  .timer-card { display: flex; flex-direction: column; align-items: center; }
  .mode-toggle {
    display: flex;
    background: var(--panel-2);
    border-radius: 999px;
    padding: 4px;
    margin-bottom: 24px;
    gap: 4px;
  }
  .mode-toggle button {
    border: none;
    background: transparent;
    color: var(--muted);
    padding: 8px 16px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-toggle button.active {
    background: var(--accent);
    color: #0f1115;
    font-weight: 600;
  }
  .ring-wrap {
    position: relative;
    width: 220px;
    height: 220px;
    margin-bottom: 24px;
  }
  svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--ring-bg); stroke-width: 10; }
  .ring-fg {
    fill: none;
    stroke: var(--accent);
    stroke-width: 10;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.3s linear, stroke 0.3s;
  }
  .ring-fg.break { stroke: var(--good); }
  .time-display {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .time-display .time {
    font-size: 42px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .time-display .label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }
  .controls { display: flex; gap: 12px; }
  .btn {
    border: none;
    border-radius: 10px;
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
  }
  .btn:active { transform: scale(0.96); }
  .btn-primary { background: var(--accent); color: #0f1115; }
  .btn-secondary { background: var(--panel-2); color: var(--text); border: 1px solid #2a2f3a; }
  .session-count {
    margin-top: 20px;
    font-size: 13px;
    color: var(--muted);
  }
  .dots { display: flex; gap: 6px; margin-top: 8px; }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--ring-bg);
  }
  .dot.filled { background: var(--accent); }

  /* Task card */
  .task-form { display: flex; gap: 8px; margin-bottom: 16px; }
  .task-form input {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid #2a2f3a;
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
  }
  .task-form input:focus { outline: 1px solid var(--accent); }
  .task-list { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow-y: auto; }
  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--panel-2);
    border-radius: 10px;
    padding: 10px 12px;
    border-left: 3px solid transparent;
  }
  .task-item.active { border-left-color: var(--accent); }
  .task-item.done { opacity: 0.5; }
  .task-item .check {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 1.5px solid var(--muted);
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
  }
  .task-item.done .check { background: var(--good); border-color: var(--good); color: #0f1115; }
  .task-item .text {
    flex: 1;
    font-size: 14px;
    cursor: pointer;
  }
  .task-item.done .text { text-decoration: line-through; }
  .task-item .pomo-count {
    font-size: 11px;
    color: var(--muted);
    background: #262b36;
    padding: 2px 6px;
    border-radius: 6px;
  }
  .task-item .remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
  }
  .task-item .remove:hover { color: var(--danger); }
  .empty-state {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    padding: 30px 0;
  }

  /* Completion overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,17,21,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    backdrop-filter: blur(4px);
  }
  .overlay.show { display: flex; }
  .overlay-content {
    text-align: center;
    animation: pop 0.4s ease;
  }
  .overlay-emoji { font-size: 64px; margin-bottom: 12px; }
  .overlay-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .overlay-sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
  @keyframes pop {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .confetti {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    overflow: hidden;
  }
  .piece {
    position: absolute;
    top: -20px;
    border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0.3; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div>
      <h1>Focus Flow</h1>
      <div class="subtitle">Small sessions, steady streaks.</div>
    </div>
    <div class="streak">
      <span class="num" id="streakNum">0</span>
      day streak
    </div>
  </div>

  <div class="card timer-card">
    <div class="mode-toggle">
      <button data-mode="work" class="active">Focus 25</button>
      <button data-mode="short">Break 5</button>
      <button data-mode="long">Long Break 15</button>
    </div>

    <div class="ring-wrap">
      <svg width="220" height="220" viewBox="0 0 220 220">
        <circle class="ring-bg" cx="110" cy="110" r="100"></circle>
        <circle class="ring-fg" id="ringFg" cx="110" cy="110" r="100"
          stroke-dasharray="628.3" stroke-dashoffset="0"></circle>
      </svg>
      <div class="time-display">
        <div class="time" id="timeDisplay">25:00</div>
        <div class="label" id="modeLabel">Focus</div>
      </div>
    </div>

    <div class="controls">
      <button class="btn btn-primary" id="startBtn">Start</button>
      <button class="btn btn-secondary" id="resetBtn">Reset</button>
    </div>

    <div class="session-count">
      <span id="sessionText">0 focus sessions today</span>
      <div class="dots" id="dots"></div>
    </div>
  </div>

  <div class="card">
    <h1>Tasks</h1>
    <div class="subtitle">What are you focusing on?</div>
    <form class="task-form" id="taskForm">
      <input type="text" id="taskInput" placeholder="Add a task..." autocomplete="off" />
      <button type="submit" class="btn btn-primary">Add</button>
    </form>
    <ul class="task-list" id="taskList"></ul>
    <div class="empty-state" id="emptyState">No tasks yet — add one to focus on it.</div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="confetti" id="confetti"></div>
  <div class="overlay-content">
    <div class="overlay-emoji" id="overlayEmoji">🎉</div>
    <div class="overlay-title" id="overlayTitle">Session complete!</div>
    <div class="overlay-sub" id="overlaySub">Nice focus. Time for a break.</div>
    <button class="btn btn-primary" id="overlayBtn">Continue</button>
  </div>
</div>

<script>
(function () {
  const DURATIONS = { work: 25 * 60, short: 5 * 60, long: 15 * 60 };
  const LABELS = { work: 'Focus', short: 'Break', long: 'Long Break' };
  const CIRC = 2 * Math.PI * 100;

  const state = load();

  let mode = 'work';
  let secondsLeft = DURATIONS[mode];
  let running = false;
  let timerId = null;
  let activeTaskId = state.tasks.find(t => !t.done)?.id ?? null;

  const els = {
    ringFg: document.getElementById('ringFg'),
    timeDisplay: document.getElementById('timeDisplay'),
    modeLabel: document.getElementById('modeLabel'),
    startBtn: document.getElementById('startBtn'),
    resetBtn: document.getElementById('resetBtn'),
    sessionText: document.getElementById('sessionText'),
    dots: document.getElementById('dots'),
    streakNum: document.getElementById('streakNum'),
    taskForm: document.getElementById('taskForm'),
    taskInput: document.getElementById('taskInput'),
    taskList: document.getElementById('taskList'),
    emptyState: document.getElementById('emptyState'),
    overlay: document.getElementById('overlay'),
    overlayEmoji: document.getElementById('overlayEmoji'),
    overlayTitle: document.getElementById('overlayTitle'),
    overlaySub: document.getElementById('overlaySub'),
    overlayBtn: document.getElementById('overlayBtn'),
    confetti: document.getElementById('confetti'),
  };

  els.ringFg.style.strokeDasharray = CIRC;

  function load() {
    const today = todayStr();
    let saved;
    try {
      saved = JSON.parse(localStorage.getItem('focusFlow') || '{}');
    } catch (e) { saved = {}; }
    const tasks = Array.isArray(saved.tasks) ? saved.tasks : [];
    let streak = saved.streak || 0;
    let lastActiveDate = saved.lastActiveDate || null;
    let sessionsToday = saved.sessionsToday || 0;
    let sessionsDate = saved.sessionsDate || today;
    if (sessionsDate !== today) {
      sessionsToday = 0;
      sessionsDate = today;
    }
    return { tasks, streak, lastActiveDate, sessionsToday, sessionsDate };
  }

  function save() {
    localStorage.setItem('focusFlow', JSON.stringify(state));
  }

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
  }

  function daysBetween(a, b) {
    const d1 = new Date(a);
    const d2 = new Date(b);
    return Math.round((d2 - d1) / 86400000);
  }

  function registerActiveDay() {
    const today = todayStr();
    if (state.lastActiveDate === today) return;
    if (state.lastActiveDate) {
      const diff = daysBetween(state.lastActiveDate, today);
      state.streak = diff === 1 ? state.streak + 1 : 1;
    } else {
      state.streak = 1;
    }
    state.lastActiveDate = today;
    save();
    renderStreak();
  }

  function renderStreak() {
    els.streakNum.textContent = state.streak;
  }

  function renderSessionCount() {
    const n = state.sessionsToday;
    els.sessionText.textContent = n + (n === 1 ? ' focus session today' : ' focus sessions today');
    els.dots.innerHTML = '';
    const total = Math.max(4, Math.ceil((n + 1) / 4) * 4);
    for (let i = 0; i < total; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot' + (i < n ? ' filled' : '');
      els.dots.appendChild(dot);
    }
  }

  function formatTime(s) {
    const m = Math.floor(s / 60).toString().padStart(2, '0');
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return m + ':' + sec;
  }

  function renderTimer() {
    els.timeDisplay.textContent = formatTime(secondsLeft);
    els.modeLabel.textContent = LABELS[mode];
    const total = DURATIONS[mode];
    const frac = secondsLeft / total;
    els.ringFg.style.strokeDashoffset = CIRC * (1 - frac);
    els.ringFg.classList.toggle('break', mode !== 'work');
    document.title = formatTime(secondsLeft) + ' · ' + LABELS[mode] + ' · Focus Flow';
  }

  function setMode(m) {
    mode = m;
    secondsLeft = DURATIONS[m];
    pause();
    document.querySelectorAll('.mode-toggle button').forEach(b => {
      b.classList.toggle('active', b.dataset.mode === m);
    });
    renderTimer();
  }

  function tick() {
    secondsLeft--;
    if (secondsLeft <= 0) {
      completeSession();
      return;
    }
    renderTimer();
  }

  function start() {
    if (running) return;
    running = true;
    els.startBtn.textContent = 'Pause';
    timerId = setInterval(tick, 1000);
  }

  function pause() {
    running = false;
    els.startBtn.textContent = 'Start';
    clearInterval(timerId);
  }

  function reset() {
    pause();
    secondsLeft = DURATIONS[mode];
    renderTimer();
  }

  function completeSession() {
    pause();
    secondsLeft = 0;
    renderTimer();

    if (mode === 'work') {
      state.sessionsToday++;
      registerActiveDay();
      renderSessionCount();
      if (activeTaskId != null) {
        const t = state.tasks.find(t => t.id === activeTaskId);
        if (t) t.pomodoros = (t.pomodoros || 0) + 1;
        save();
        renderTasks();
      }
      const nextMode = state.sessionsToday % 4 === 0 ? 'long' : 'short';
      showOverlay('🎉', 'Focus session complete!', "Nice work. Let's take a break.", nextMode);
    } else {
      showOverlay('☀️', 'Break\'s over', 'Ready for another round?', 'work');
    }
  }

  function showOverlay(emoji, title, sub, nextMode) {
    els.overlayEmoji.textContent = emoji;
    els.overlayTitle.textContent = title;
    els.overlaySub.textContent = sub;
    els.overlay.classList.add('show');
    spawnConfetti();
    els.overlayBtn.onclick = () => {
      els.overlay.classList.remove('show');
      els.confetti.innerHTML = '';
      setMode(nextMode);
    };
  }

  function spawnConfetti() {
    const colors = ['#7c9bff', '#ff9d7c', '#6fe3a0', '#ffd66f'];
    els.confetti.innerHTML = '';
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'piece';
      const size = 6 + Math.random() * 6;
      p.style.width = size + 'px';
      p.style.height = size * 0.4 + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (2 + Math.random() * 2) + 's';
      p.style.animationDelay = (Math.random() * 0.5) + 's';
      els.confetti.appendChild(p);
    }
  }

  // Tasks
  function renderTasks() {
    els.taskList.innerHTML = '';
    els.emptyState.style.display = state.tasks.length ? 'none' : 'block';
    state.tasks.forEach(task => {
      const li = document.createElement('li');
      li.className = 'task-item' + (task.done ? ' done' : '') + (task.id === activeTaskId ? ' active' : '');
      li.innerHTML = `
        <div class="check">${task.done ? '✓' : ''}</div>
        <div class="text">${escapeHtml(task.text)}</div>
        ${task.pomodoros ? `<div class="pomo-count">🍅 ${task.pomodoros}</div>` : ''}
        <button class="remove" title="Remove">✕</button>
      `;
      li.querySelector('.check').addEventListener('click', () => {
        task.done = !task.done;
        save();
        renderTasks();
      });
      li.querySelector('.text').addEventListener('click', () => {
        if (task.done) return;
        activeTaskId = task.id;
        renderTasks();
      });
      li.querySelector('.remove').addEventListener('click', () => {
        state.tasks = state.tasks.filter(t => t.id !== task.id);
        if (activeTaskId === task.id) activeTaskId = state.tasks.find(t => !t.done)?.id ?? null;
        save();
        renderTasks();
      });
      els.taskList.appendChild(li);
    });
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  els.taskForm.addEventListener('submit', e => {
    e.preventDefault();
    const text = els.taskInput.value.trim();
    if (!text) return;
    const task = { id: Date.now(), text, done: false, pomodoros: 0 };
    state.tasks.push(task);
    if (activeTaskId == null) activeTaskId = task.id;
    save();
    els.taskInput.value = '';
    renderTasks();
  });

  document.querySelectorAll('.mode-toggle button').forEach(btn => {
    btn.addEventListener('click', () => setMode(btn.dataset.mode));
  });

  els.startBtn.addEventListener('click', () => running ? pause() : start());
  els.resetBtn.addEventListener('click', reset);

  // init
  renderStreak();
  renderSessionCount();
  renderTasks();
  renderTimer();
})();
</script>

</body>
</html>
